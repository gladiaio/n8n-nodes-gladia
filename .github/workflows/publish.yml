name: Publish

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Semantic version to release (for example, 0.1.7)'
        required: true
        type: string

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Create release commit and tag
    runs-on: ubuntu-latest

    outputs:
      tag: ${{ steps.version.outputs.tag }}

    permissions:
      contents: write

    steps:
      - name: Require a branch
        if: github.ref_type != 'branch'
        run: |
          echo 'Run this workflow from the branch you want to release.'
          exit 1

      - uses: actions/checkout@v6
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Validate semantic version
        env:
          RELEASE_VERSION: ${{ inputs.version }}
        run: |
          VERSION=${RELEASE_VERSION#v}
          node - "$VERSION" <<'NODE'
          const version = process.argv[2];
          const semver = /^(0|[1-9]\d*)\.(0|[1-9]\d*)\.(0|[1-9]\d*)(?:-((?:0|[1-9]\d*|\d*[A-Za-z-][0-9A-Za-z-]*)(?:\.(?:0|[1-9]\d*|\d*[A-Za-z-][0-9A-Za-z-]*))*))?(?:\+([0-9A-Za-z-]+(?:\.[0-9A-Za-z-]+)*))?$/;

          if (!semver.test(version)) {
            console.error(`Invalid semantic version: ${version}`);
            console.error('Expected SemVer 2.0.0, for example: 1.2.3, v1.2.3, or 1.2.3-rc.1');
            process.exit(1);
          }
          NODE

      - name: Update package version
        id: version
        env:
          RELEASE_VERSION: ${{ inputs.version }}
        run: |
          VERSION=${RELEASE_VERSION#v}
          npm version "$VERSION" --allow-same-version --no-git-tag-version
          echo "RELEASE_TAG=v$VERSION" >> "$GITHUB_ENV"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Commit and tag release
        env:
          RELEASE_BRANCH: ${{ github.ref_name }}
        run: |
          if git ls-remote --exit-code --tags origin "refs/tags/$RELEASE_TAG" >/dev/null 2>&1; then
            echo "Tag $RELEASE_TAG already exists."
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          git diff --quiet --cached || git commit -m "chore: release $RELEASE_TAG"
          git tag "$RELEASE_TAG"
          git push --atomic origin "HEAD:$RELEASE_BRANCH" "refs/tags/$RELEASE_TAG"

  publish:
    name: Publish to npm
    needs: release
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.release.outputs.tag }}
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish to npm
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
