name: Publish

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Semantic version to release (for example, 0.1.7)'
        required: true
        type: string
  pull_request:
    branches:
      - main
    types:
      - closed

concurrency:
  group: release-${{ github.event_name }}
  cancel-in-progress: false

jobs:
  prepare-release:
    name: Open release pull request
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Validate and update version
        id: version
        env:
          RELEASE_VERSION: ${{ inputs.version }}
        run: |
          VERSION=${RELEASE_VERSION#v}
          node - "$VERSION" <<'NODE'
          const version = process.argv[2];
          const semver = /^(0|[1-9]\d*)\.(0|[1-9]\d*)\.(0|[1-9]\d*)(?:-((?:0|[1-9]\d*|\d*[A-Za-z-][0-9A-Za-z-]*)(?:\.(?:0|[1-9]\d*|\d*[A-Za-z-][0-9A-Za-z-]*))*))?(?:\+([0-9A-Za-z-]+(?:\.[0-9A-Za-z-]+)*))?$/;

          if (!semver.test(version)) {
            console.error(`Invalid semantic version: ${version}`);
            console.error('Expected SemVer 2.0.0, for example: 1.2.3, v1.2.3, or 1.2.3-rc.1');
            process.exit(1);
          }
          NODE

          npm version "$VERSION" --no-git-tag-version
          echo "number=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Ensure version is not already released
        env:
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
          RELEASE_VERSION: ${{ steps.version.outputs.number }}
        run: |
          PACKAGE_NAME=$(node -p "require('./package.json').name")

          if git ls-remote --exit-code --tags origin "refs/tags/$RELEASE_TAG" >/dev/null 2>&1; then
            echo "Tag $RELEASE_TAG already exists."
            exit 1
          fi

          if npm view "$PACKAGE_NAME@$RELEASE_VERSION" version >/dev/null 2>&1; then
            echo "$PACKAGE_NAME@$RELEASE_VERSION is already published."
            exit 1
          fi

      - uses: ./.github/actions/verify

      - name: Open or update release PR
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          base: main
          branch: release/${{ steps.version.outputs.tag }}
          delete-branch: true
          labels: release
          commit-message: 'chore: release ${{ steps.version.outputs.tag }}'
          title: 'chore: release ${{ steps.version.outputs.tag }}'
          body: |
            Automated release PR for **${{ steps.version.outputs.tag }}**.

            Merging this PR will automatically create the tag and publish the package to npm.

  publish:
    name: Tag and publish merged release
    if: >-
      github.event_name == 'pull_request' &&
      github.event.pull_request.merged == true &&
      startsWith(github.event.pull_request.head.ref, 'release/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Verify release version
        env:
          RELEASE_BRANCH: ${{ github.event.pull_request.head.ref }}
        run: |
          EXPECTED_VERSION=${RELEASE_BRANCH#release/v}
          PACKAGE_VERSION=$(node -p "require('./package.json').version")

          if [ "$PACKAGE_VERSION" != "$EXPECTED_VERSION" ]; then
            echo "Release branch expects $EXPECTED_VERSION, but package.json contains $PACKAGE_VERSION."
            exit 1
          fi

          echo "PACKAGE_VERSION=$PACKAGE_VERSION" >> "$GITHUB_ENV"
          echo "RELEASE_TAG=v$PACKAGE_VERSION" >> "$GITHUB_ENV"

      - uses: ./.github/actions/verify

      - name: Create release tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if git ls-remote --exit-code --tags origin "refs/tags/$RELEASE_TAG" >/dev/null 2>&1; then
            git fetch origin "refs/tags/$RELEASE_TAG:refs/tags/$RELEASE_TAG"

            if [ "$(git rev-parse "$RELEASE_TAG^{commit}")" != "$(git rev-parse HEAD)" ]; then
              echo "Tag $RELEASE_TAG already exists on another commit."
              exit 1
            fi

            echo "Tag $RELEASE_TAG already points to this commit."
          else
            git tag "$RELEASE_TAG"
            ORIGINAL_ORIGIN=$(git remote get-url origin)
            git remote set-url origin "https://x-access-token:$GITHUB_TOKEN@github.com/${{ github.repository }}.git"
            git push origin "refs/tags/$RELEASE_TAG"
            git remote set-url origin "$ORIGINAL_ORIGIN"
          fi

      - name: Publish to npm
        run: |
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          if npm view "$PACKAGE_NAME@$PACKAGE_VERSION" version >/dev/null 2>&1; then
            echo "$PACKAGE_NAME@$PACKAGE_VERSION is already published."
            exit 0
          fi

          npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
