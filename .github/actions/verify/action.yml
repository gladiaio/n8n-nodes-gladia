name: Verify package
description: Install dependencies, lint, build, and test the package

runs:
  using: composite
  steps:
    - name: Install dependencies
      run: npm ci
      shell: bash

    - name: Lint
      run: npm run lint
      shell: bash

    - name: Build
      run: npm run build
      shell: bash

    - name: Test
      run: npm test
      shell: bash
